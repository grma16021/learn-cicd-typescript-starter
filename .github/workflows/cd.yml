name: cd
on:
  push:
    branches: [main]


jobs: 
  Deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: check out code
        uses: actions/checkout@v4
      
      - name: set up node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: install dependencies
        run: npm ci
      
      - name: build
        run: npm run build
  
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS}}'
        
      - name: Set up cloud SDK
        uses: google-github-actions/setup-gcloud@v3
      
      - name: use gcloud cli
        run: gcloud info

      - name: build-and-push
        run: gcloud builds submit --tag us-central1-docker.pkg.dev/notely-496814/notely-ar-repo/notely:latest

      - name: Deploy to cloud run
        run: gcloud run deploy notely --image us-central1-docker.pkg.dev/notely-496814/notely-ar-repo/notely:latest --region us-central1 --allow-unauthenticated --project notely-496814 --max-instances=4